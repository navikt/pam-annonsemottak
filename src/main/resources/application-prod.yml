spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_DATABASE}?user=${DB_USERNAME}&password=${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 0
      max-lifetime: 45000
      connection-timeout: 30000
      idle-timeout: 35000
finn:
  cron:
    schedule: ${FINN_CRON_SCHEDULE}
